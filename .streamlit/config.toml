# Konfigurasi Streamlit untuk deployment.
# Streamlit Community Cloud mengelola port & headless sendiri.

[theme]
base = "dark"
primaryColor = "#3987e5"
backgroundColor = "#000000"          # halaman utama: hitam
secondaryBackgroundColor = "#141414"  # sidebar & kartu: abu sangat gelap
textColor = "#e8e8e8"

[server]
maxUploadSize = 50

[browser]
gatherUsageStats = false
